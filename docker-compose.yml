services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: spamdetector-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spamdetector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: alunoguida22
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spamdetector"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spamdetector-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Aponta o backend para o serviço "db" interno do Docker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: spamdetector
      DB_USER: postgres
      DB_PASSWORD_SPAM: alunoguida22
      # Permite o front-end (container) chamar a API
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Front-end Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./front-end/projetospamfinal
      dockerfile: Dockerfile
      args:
        # Em produção Docker, o browser chama o backend via porta pública
        NEXT_PUBLIC_SPAM_API_URL: http://localhost:8080
    container_name: spamdetector-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
