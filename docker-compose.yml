services:

  db:
    image: postgres:18-alpine
    container_name: spamdetector-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spamdetector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: alunoguida22
    ports:
      - "5433:5432"
    volumes:

      - pgdata:/var/lib/postgresql
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - ./modelo_treinado.sql:/backup/modelo_treinado.sql:ro
    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d spamdetector && psql -U postgres -d spamdetector -tAc 'SELECT 1 FROM word_frequencies WHERE id = 2732713 LIMIT 1' | grep -q 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 600s


  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spamdetector-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: spamdetector
      DB_USER: postgres
      DB_PASSWORD_SPAM: alunoguida22
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      APP_IMPORT_ENABLED: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s


  frontend:
    build:
      context: ./front-end/projetospamfinal
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SPAM_API_URL: http://localhost:8080
    container_name: spamdetector-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata: