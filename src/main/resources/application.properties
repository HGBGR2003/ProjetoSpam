spring.application.name=emails

app.import.enabled=${APP_IMPORT_ENABLED:true}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spamdetector}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD_SPAM:alunoguida22}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

training.batch-size=5000
training.insert-batch-size=1000
training.max-emails=0

spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.connect-retries=30
spring.flyway.connect-retries-interval=10

classifier.spam-threshold=0.80

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never