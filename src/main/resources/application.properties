spring.application.name=emails
spring.datasource.url=jdbc:postgresql://localhost:5432/spamdetector
spring.datasource.username=postgres
spring.datasource.password=alunoguida22
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Habilita o batch insert do Hibernate para o saveAll() do treinamento
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration