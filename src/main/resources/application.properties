spring.application.name=emails

# Em desenvolvimento local aponta para localhost.
# No Docker, DB_HOST é sobrescrito para o nome do serviço "db" pelo docker-compose.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spamdetector}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD_SPAM:alunoguida22}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

training.batch-size=5000
training.insert-batch-size=1000
training.max-emails=0

spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# -----------------------------------------------------------------------
# Classificador Naive Bayes
# -----------------------------------------------------------------------
# Limiar mínimo de P(spam) para classificar um e-mail como SPAM.
# Com base desbalanceada (600k spam / 2k ham) e prior 0.5/0.5,
# elevar o threshold reduz falsos positivos em e-mails legítimos.
# Ajuste conforme feedback: 0.75 = conservador, 0.60 = mais agressivo.
classifier.spam-threshold=0.80

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000